<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEE Chat — 认知涌现引擎 AI 对话</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--panel:#161822;--card:#1c1e2e;--border:#2a2d3e;
  --text:#e1e4ed;--muted:#7c82a0;--accent:#6c8cff;--accent2:#4ef0a0;
  --danger:#ff5c72;--warn:#f0a04e;--good:#4ef0a0;
  --radius:10px;--radius-sm:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

header{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-size:16px;font-weight:700;white-space:nowrap}
header h1 span{color:var(--accent)}
.settings-toggle{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px}
.settings-toggle:hover{background:var(--border)}

#settings-panel{display:none;background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;flex-shrink:0}
#settings-panel.active{display:block}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:700px}
@media(max-width:600px){.settings-grid{grid-template-columns:1fr}}
.setting-group{display:flex;flex-direction:column;gap:4px}
.setting-group label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.setting-group input,.setting-group select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:var(--radius-sm);font-size:13px;width:100%}
.setting-group input:focus,.setting-group select:focus{outline:none;border-color:var(--accent)}
.setting-row{display:flex;align-items:center;gap:10px}
.toggle-switch{position:relative;width:40px;height:22px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border);border-radius:22px;transition:.2s}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:var(--text);border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:var(--accent)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px)}

#chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.message{display:flex;gap:10px;max-width:800px;width:100%;animation:fadeIn .2s ease}
.message.user{align-self:flex-end;flex-direction:row-reverse}
.message.assistant{align-self:flex-start}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.user .avatar{background:var(--accent);color:#fff}
.assistant .avatar{background:var(--accent2);color:#111}
.msg-content{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-width:100%}
.user .msg-content{background:var(--accent);border-color:var(--accent);color:#fff}
.cee-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:11px;margin-top:8px;font-weight:600}
.cee-badge.tier-exceptional,.cee-badge.tier-excellent{background:#1a3a2a;color:var(--good)}
.cee-badge.tier-good{background:#1a3520;color:#8ce0a0}
.cee-badge.tier-fair{background:#3a2a1a;color:var(--warn)}
.cee-badge.tier-poor,.cee-badge.tier-critical{background:#3a1a1a;color:var(--danger)}
.cee-detail{font-size:11px;color:var(--muted);margin-top:4px}
.optimized-tag{display:inline-block;padding:2px 6px;border-radius:4px;background:var(--accent2);color:#111;font-size:10px;font-weight:700;margin-left:6px}

#input-area{background:var(--panel);border-top:1px solid var(--border);padding:12px 16px;flex-shrink:0}
.input-row{display:flex;gap:10px;max-width:800px;margin:0 auto}
#msg-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--radius);font-size:14px;resize:none;min-height:44px;max-height:160px;font-family:inherit;line-height:1.5}
#msg-input:focus{outline:none;border-color:var(--accent)}
#send-btn{background:var(--accent);color:#fff;border:none;padding:0 20px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s}
#send-btn:hover{opacity:.9}
#send-btn:disabled{opacity:.5;cursor:not-allowed}

.typing-indicator{display:flex;gap:4px;padding:8px 0}
.typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px}
.empty-state .icon{font-size:48px;opacity:.3}
.empty-state p{font-size:14px;text-align:center;max-width:300px;line-height:1.6}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header>
  <h1><span>CEE</span> Chat</h1>
  <button class="settings-toggle" onclick="toggleSettings()">Settings</button>
</header>

<div id="settings-panel">
  <div class="settings-grid">
    <div class="setting-group">
      <label>API Key</label>
      <input type="password" id="api-key" placeholder="sk-...">
    </div>
    <div class="setting-group">
      <label>Base URL</label>
      <input type="text" id="base-url" value="https://api.openai.com/v1" placeholder="https://api.openai.com/v1">
    </div>
    <div class="setting-group">
      <label>Model</label>
      <select id="model">
        <option value="gpt-4o-mini">gpt-4o-mini</option>
        <option value="gpt-4o">gpt-4o</option>
        <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
        <option value="deepseek-chat">deepseek-chat</option>
        <option value="claude-3-5-sonnet-20241022">claude-3-5-sonnet</option>
        <option value="custom">Custom...</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Temperature</label>
      <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('temp-val').textContent=this.value">
      <span style="font-size:11px;color:var(--muted)">Value: <span id="temp-val">0.7</span></span>
    </div>
    <div class="setting-group">
      <label>CEE Quality Threshold</label>
      <input type="range" id="cee-threshold" min="0.3" max="0.95" step="0.05" value="0.7" oninput="document.getElementById('thresh-val').textContent=this.value">
      <span style="font-size:11px;color:var(--muted)">Min score: <span id="thresh-val">0.70</span></span>
    </div>
    <div class="setting-group">
      <label style="margin-bottom:6px">Enable CEE Optimization</label>
      <label class="toggle-switch">
        <input type="checkbox" id="cee-enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
</div>

<div id="chat-area">
  <div class="empty-state">
    <div class="icon">CEE</div>
    <p>Enter your API Key in Settings above, then start a conversation.<br>Each AI response is evaluated by the Cognitive Emergence Engine and auto-optimized.</p>
  </div>
</div>

<div id="input-area">
  <div class="input-row">
    <textarea id="msg-input" placeholder="Type a message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const chatArea=document.getElementById('chat-area');
const msgInput=document.getElementById('msg-input');
const sendBtn=document.getElementById('send-btn');
let messages=[];
let emptyState=chatArea.querySelector('.empty-state');

function toggleSettings(){
  document.getElementById('settings-panel').classList.toggle('active');
}

function getConfig(){
  return {
    api_key:document.getElementById('api-key').value.trim(),
    base_url:document.getElementById('base-url').value.trim(),
    model:document.getElementById('model').value,
    temperature:parseFloat(document.getElementById('temperature').value),
    enable_cee:document.getElementById('cee-enabled').checked,
    cee_threshold:parseFloat(document.getElementById('cee-threshold').value),
  };
}

function tierColor(tier){
  const m={'exceptional':'#4ef0a0','excellent':'#4ef0a0','good':'#8ce0a0','fair':'#f0a04e','poor':'#ff5c72','critical':'#ff4058'};
  return m[tier]||'#7c82a0';
}

function addMessage(role,content,ceeData){
  if(emptyState){emptyState.remove();emptyState=null;}
  const div=document.createElement('div');
  div.className='message '+role;
  div.innerHTML=
    '<div class="avatar">'+(role==='user'?'U':'AI')+'</div>'+
    '<div class="msg-content">'+escapeHtml(content);
  if(ceeData&&ceeData.scores){
    const s=ceeData.scores;
    div.querySelector('.msg-content').innerHTML+=
      '<div class="cee-badge tier-'+s.tier+'">'+
      'CEE '+s.composite.toFixed(2)+' ['+s.tier+']'+(ceeData.optimized?'<span class="optimized-tag">OPT</span>':'')+
      '</div>'+
      '<div class="cee-detail">'+
      'ITC:'+s.itc.toFixed(2)+' SCS:'+s.scs.toFixed(2)+' IEC:'+s.iec.toFixed(2)+' PFFT:'+s.pfft.toFixed(2)+
      (ceeData.retries?'  (Retries: '+ceeData.retries+')':'')+
      '</div>';
  }
  div.innerHTML+='</div>';
  chatArea.appendChild(div);
  chatArea.scrollTop=chatArea.scrollHeight;
}

function addTyping(){
  if(emptyState){emptyState.remove();emptyState=null;}
  const div=document.createElement('div');
  div.className='message assistant';
  div.id='typing-msg';
  div.innerHTML='<div class="avatar">AI</div><div class="msg-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
  chatArea.appendChild(div);
  chatArea.scrollTop=chatArea.scrollHeight;
}

function removeTyping(){
  const el=document.getElementById('typing-msg');
  if(el)el.remove();
}

function escapeHtml(text){
  const d=document.createElement('div');
  d.textContent=text;
  return d.innerHTML;
}

async function sendMessage(){
  const config=getConfig();
  const text=msgInput.value.trim();
  if(!text)return;
  if(!config.api_key){alert('Please enter your API Key in Settings first.');return;}

  msgInput.value='';
  msgInput.style.height='auto';
  sendBtn.disabled=true;

  addMessage('user',text);
  messages.push({role:'user',content:text});
  addTyping();

  try{
    const resp=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        messages:messages,
        api_key:config.api_key,
        base_url:config.base_url,
        model:config.model,
        temperature:config.temperature,
        enable_cee:config.enable_cee,
        cee_threshold:config.cee_threshold,
      }),
    });
    if(!resp.ok){
      const err=await resp.text();
      throw new Error('HTTP '+resp.status+': '+err.substring(0,200));
    }
    const data=await resp.json();
    removeTyping();
    addMessage('assistant',data.content,{
      scores:data.cee_scores,
      optimized:data.optimized,
      retries:data.retries,
    });
    messages.push({role:'assistant',content:data.content});
  }catch(e){
    removeTyping();
    addMessage('assistant','Error: '+e.message);
  }
  sendBtn.disabled=false;
  msgInput.focus();
}

msgInput.addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,160)+'px';
});

document.getElementById('settings-panel').classList.add('active');
</script>
</body>
</html>
