<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CEE Chat — 认知涌现引擎 AI 对话</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;--panel:#141414;--card:#1a1a1a;--border:#262626;
  --text:#ececec;--muted:#9b9b9b;--accent:#5b8af7;--accent2:#4ade80;
  --danger:#ef4444;--warn:#f59e0b;
  --radius:14px;--radius-sm:10px;--radius-xs:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

header{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;backdrop-filter:blur(20px)}
header .logo{width:36px;height:36px;border-radius:var(--radius-sm);overflow:hidden;display:flex;align-items:center;justify-content:center}
header .logo img{width:100%;height:100%;display:block}
header h1{font-size:16px;font-weight:650;letter-spacing:-.3px}
header h1 span{color:var(--accent)}
header .header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.settings-toggle{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.settings-toggle:hover{background:var(--border);border-color:var(--accent)}

#settings-panel{display:none;background:var(--card);border-bottom:1px solid var(--border);padding:16px 20px;flex-shrink:0}
#settings-panel.active{display:block}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;max-width:900px}
.setting-group{display:flex;flex-direction:column;gap:5px}
.setting-group label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.setting-group input,.setting-group select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--radius-xs);font-size:13px;width:100%;transition:border-color .15s}
.setting-group input:focus,.setting-group select:focus{outline:none;border-color:var(--accent)}
.setting-row{display:flex;align-items:center;gap:10px}
.toggle-switch{position:relative;width:42px;height:24px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border);border-radius:24px;transition:.2s}
.toggle-slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:var(--text);border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:var(--accent)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px);background:#fff}

#chat-area{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:14px;max-width:800px;margin:0 auto;width:100%}
.message{display:flex;gap:10px;max-width:100%;animation:fadeIn .3s ease}
.message.user{align-self:flex-end;flex-direction:row-reverse}
.message.assistant{align-self:flex-start}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:650;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;display:block}
.avatar span{display:block}
.user .avatar{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff}
.assistant .avatar{background:transparent;border:1px solid var(--border)}
.msg-content{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-width:100%}
.user .msg-content{background:linear-gradient(135deg,var(--accent),#5578e8);border-color:transparent;color:#fff;border-bottom-right-radius:6px}
.assistant .msg-content{border-top-left-radius:6px}
.cee-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;margin-top:10px;font-weight:600}
.cee-badge.tier-exceptional,.cee-badge.tier-excellent,.cee-badge.tier-S,.cee-badge.tier-A{background:rgba(74,222,128,.1);color:var(--accent2);border:1px solid rgba(74,222,128,.2)}
.cee-badge.tier-good,.cee-badge.tier-B{background:rgba(91,138,247,.1);color:var(--accent);border:1px solid rgba(91,138,247,.2)}
.cee-badge.tier-fair,.cee-badge.tier-C{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.cee-badge.tier-poor,.cee-badge.tier-critical,.cee-badge.tier-D{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.cee-detail{font-size:11px;color:var(--muted);margin-top:6px}
.optimized-tag{display:inline-block;padding:2px 8px;border-radius:4px;background:var(--accent2);color:#111;font-size:10px;font-weight:700;margin-left:6px}
.user .cee-detail{color:rgba(255,255,255,.6)}
.user .cee-badge{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}

#input-area{background:var(--panel);border-top:1px solid var(--border);padding:14px 20px;flex-shrink:0;backdrop-filter:blur(20px)}
.input-row{display:flex;gap:10px;max-width:800px;margin:0 auto}
#msg-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 18px;border-radius:24px;font-size:14px;resize:none;min-height:48px;max-height:160px;font-family:inherit;line-height:1.5;transition:border-color .15s}
#msg-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,138,247,.1)}
#send-btn{background:var(--accent);color:#fff;border:none;padding:0 24px;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
#send-btn:hover{opacity:.9;transform:scale(1.02)}
#send-btn:disabled{opacity:.35;cursor:not-allowed;background:var(--card);color:var(--muted)}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:14px}
.empty-state .icon{width:72px;height:72px;border-radius:20px;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 40px rgba(91,138,247,.2)}
.empty-state .icon img{width:100%;height:100%;display:block}
.empty-state p{font-size:15px;text-align:center;max-width:340px;line-height:1.7}
@keyframes pulse{0%,100%{box-shadow:0 8px 40px rgba(91,138,247,.2)}50%{box-shadow:0 8px 60px rgba(91,138,247,.4)}}
.typing-indicator{display:flex;gap:5px;padding:10px 0}
.typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:bounce 1.4s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{opacity:.3;transform:scale(.7)}40%{opacity:1;transform:scale(1.2)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
  .settings-grid{grid-template-columns:1fr}
  #chat-area{padding:14px 12px}
  #input-area{padding:12px 12px}
}
</style>
</head>
<body>

<header>
  <div class="logo"><img src="/static/avatar.svg" alt="CEE" width="32" height="32"></div>
  <h1><span>CEE</span> Chat</h1>
  <div class="header-right">
    <button class="settings-toggle" onclick="toggleSettings()">Settings</button>
  </div>
</header>

<div id="settings-panel">
  <div class="settings-grid">
    <div class="setting-group">
      <label>API Key</label>
      <input type="password" id="api-key" placeholder="sk-...">
    </div>
    <div class="setting-group">
      <label>Base URL</label>
      <input type="text" id="base-url" value="https://api.openai.com/v1" placeholder="https://api.openai.com/v1">
    </div>
    <div class="setting-group">
      <label>Model</label>
      <select id="model">
        <option value="gpt-4o-mini">gpt-4o-mini</option>
        <option value="gpt-4o">gpt-4o</option>
        <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
        <option value="deepseek-chat">deepseek-chat</option>
        <option value="claude-3-5-sonnet-20241022">claude-3-5-sonnet</option>
        <option value="custom">Custom...</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Temperature</label>
      <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('temp-val').textContent=this.value">
      <span style="font-size:11px;color:var(--muted)">Value: <span id="temp-val">0.7</span></span>
    </div>
    <div class="setting-group">
      <label>CEE Quality Threshold</label>
      <input type="range" id="cee-threshold" min="0.3" max="0.95" step="0.05" value="0.7" oninput="document.getElementById('thresh-val').textContent=this.value">
      <span style="font-size:11px;color:var(--muted)">Min score: <span id="thresh-val">0.70</span></span>
    </div>
    <div class="setting-group">
      <label style="margin-bottom:6px">CEE Optimization</label>
      <label class="toggle-switch">
        <input type="checkbox" id="cee-enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
</div>

<div id="chat-area">
  <div class="empty-state">
    <div class="icon"><img src="/static/avatar.svg" alt="CEE" width="64" height="64"></div>
    <p>在 Settings 中输入 API Key 即可开始对话。<br>每条 AI 回复都会经过认知涌现引擎评估并自动优化。</p>
  </div>
</div>

<div id="input-area">
  <div class="input-row">
    <textarea id="msg-input" placeholder="输入消息..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button id="send-btn" onclick="sendMessage()">发送</button>
  </div>
</div>

<script>
const chatArea=document.getElementById('chat-area');
const msgInput=document.getElementById('msg-input');
const sendBtn=document.getElementById('send-btn');
let messages=[];
let emptyState=chatArea.querySelector('.empty-state');

function toggleSettings(){
  document.getElementById('settings-panel').classList.toggle('active');
}

function getConfig(){
  return {
    api_key:document.getElementById('api-key').value.trim(),
    base_url:document.getElementById('base-url').value.trim(),
    model:document.getElementById('model').value,
    temperature:parseFloat(document.getElementById('temperature').value),
    enable_cee:document.getElementById('cee-enabled').checked,
    cee_threshold:parseFloat(document.getElementById('cee-threshold').value),
  };
}

function addMessage(role,content,ceeData){
  if(emptyState){emptyState.remove();emptyState=null;}
  const div=document.createElement('div');
  div.className='message '+role;
  div.innerHTML=
    '<div class="avatar">'+(role==='user'?'<span>U</span>':'<img src="/static/avatar.svg" alt="CEE" width="28" height="28">')+'</div>'+
    '<div class="msg-content">'+escapeHtml(content);
  if(ceeData&&ceeData.scores){
    const s=ceeData.scores;
    const tier=s.tier||'';
    div.querySelector('.msg-content').innerHTML+=
      '<div class="cee-badge tier-'+tier+'">'+
      'CEE '+s.composite.toFixed(2)+' ['+tier+']'+(ceeData.optimized?'<span class="optimized-tag">OPT</span>':'')+
      '</div>'+
      '<div class="cee-detail">'+
      'ITC:'+s.itc.toFixed(2)+' SCS:'+s.scs.toFixed(2)+' IEC:'+s.iec.toFixed(2)+' PFFT:'+s.pfft.toFixed(2)+
      (ceeData.retries?'  Retries:'+ceeData.retries:'')+
      '</div>';
  }
  div.innerHTML+='</div>';
  chatArea.appendChild(div);
  chatArea.scrollTop=chatArea.scrollHeight;
}

function addTyping(){
  if(emptyState){emptyState.remove();emptyState=null;}
  const div=document.createElement('div');
  div.className='message assistant';
  div.id='typing-msg';
  div.innerHTML='<div class="avatar"><img src="/static/avatar.svg" alt="CEE" width="28" height="28"></div><div class="msg-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
  chatArea.appendChild(div);
  chatArea.scrollTop=chatArea.scrollHeight;
}

function removeTyping(){
  const el=document.getElementById('typing-msg');
  if(el)el.remove();
}

function escapeHtml(text){
  const d=document.createElement('div');
  d.textContent=text;
  return d.innerHTML;
}

async function sendMessage(){
  const config=getConfig();
  const text=msgInput.value.trim();
  if(!text)return;
  if(!config.api_key){alert('请在 Settings 中输入 API Key。');return;}

  msgInput.value='';
  msgInput.style.height='auto';
  sendBtn.disabled=true;

  addMessage('user',text);
  messages.push({role:'user',content:text});
  addTyping();

  try{
    const resp=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        messages:messages,
        api_key:config.api_key,
        base_url:config.base_url,
        model:config.model,
        temperature:config.temperature,
        enable_cee:config.enable_cee,
        cee_threshold:config.cee_threshold,
      }),
    });
    if(!resp.ok){
      const err=await resp.text();
      throw new Error('HTTP '+resp.status+': '+err.substring(0,200));
    }
    const data=await resp.json();
    removeTyping();
    addMessage('assistant',data.content,{
      scores:data.cee_scores,
      optimized:data.optimized,
      retries:data.retries,
    });
    messages.push({role:'assistant',content:data.content});
  }catch(e){
    removeTyping();
    addMessage('assistant','错误: '+e.message);
  }
  sendBtn.disabled=false;
  msgInput.focus();
}

msgInput.addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,160)+'px';
});

document.getElementById('settings-panel').classList.add('active');
</script>
</body>
</html>
