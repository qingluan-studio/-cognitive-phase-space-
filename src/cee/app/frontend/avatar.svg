<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#060a14"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.95"/>
      <stop offset="25%" stop-color="#818cf8" stop-opacity="0.7"/>
      <stop offset="55%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreInner" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="80%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <linearGradient id="ray1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="ray2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="ray3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="ray4" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="ray5" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="ray6" x1="0%" y1="80%" x2="100%" y2="20%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="1.8"/>
      </feComponentTransfer>
      <feMerge><feMergeNode in="glow1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="128" cy="128" r="124" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Hexagonal inner ring -->
  <polygon points="128,58 188,88 188,148 128,178 68,148 68,88" fill="none" stroke="#334155" stroke-width="0.6" opacity="0.4"/>
  <polygon points="128,68 178,96 178,144 128,172 78,144 78,96" fill="none" stroke="#475569" stroke-width="0.5" opacity="0.25"/>

  <!-- Angular circuit traces -->
  <path d="M128,58 L128,46 M188,88 L198,82 M188,148 L198,158 M128,178 L128,190 M68,148 L58,158 M68,88 L58,82" stroke="#38bdf8" stroke-width="0.8" opacity="0.3" filter="url(#neon)"/>
  <path d="M128,38 L128,28 M202,38 L212,34 M202,198 L212,202 M128,212 L128,222 M54,198 L44,202 M54,38 L44,34" stroke="#a855f7" stroke-width="0.6" opacity="0.2" filter="url(#neon)"/>

  <!-- Circuit nodes -->
  <circle cx="128" cy="28" r="2.5" fill="#38bdf8" filter="url(#glow)" opacity="0.7"/>
  <circle cx="212" cy="34" r="2.5" fill="#a855f7" filter="url(#glow)" opacity="0.7"/>
  <circle cx="212" cy="202" r="2.5" fill="#38bdf8" filter="url(#glow)" opacity="0.7"/>
  <circle cx="128" cy="222" r="2.5" fill="#a855f7" filter="url(#glow)" opacity="0.7"/>
  <circle cx="44" cy="202" r="2.5" fill="#38bdf8" filter="url(#glow)" opacity="0.7"/>
  <circle cx="44" cy="34" r="2.5" fill="#a855f7" filter="url(#glow)" opacity="0.7"/>

  <!-- Ambient glow behind core -->
  <circle cx="128" cy="115" r="75" fill="url(#coreGlow)" filter="url(#softGlow)" opacity="0.45"/>

  <!-- Six rays representing T1-T6 engines -->
  <line x1="128" y1="110" x2="192" y2="46" stroke="url(#ray1)" stroke-width="1.5" stroke-linecap="round" filter="url(#neon)"/>
  <line x1="128" y1="110" x2="200" y2="166" stroke="url(#ray2)" stroke-width="1.5" stroke-linecap="round" filter="url(#neon)"/>
  <line x1="128" y1="110" x2="128" y2="198" stroke="url(#ray3)" stroke-width="1.5" stroke-linecap="round" filter="url(#neon)"/>
  <line x1="128" y1="110" x2="56" y2="174" stroke="url(#ray4)" stroke-width="1.5" stroke-linecap="round" filter="url(#neon)"/>
  <line x1="128" y1="110" x2="54" y2="46" stroke="url(#ray5)" stroke-width="1.5" stroke-linecap="round" filter="url(#neon)"/>
  <line x1="128" y1="110" x2="128" y2="38" stroke="url(#ray6)" stroke-width="1.5" stroke-linecap="round" filter="url(#neon)"/>

  <!-- Orbital nodes on rays with larger glow -->
  <circle cx="184" cy="56" r="4" fill="#38bdf8" filter="url(#strongGlow)" opacity="0.95"/>
  <circle cx="194" cy="158" r="3.5" fill="#a855f7" filter="url(#strongGlow)" opacity="0.9"/>
  <circle cx="128" cy="190" r="4" fill="#38bdf8" filter="url(#strongGlow)" opacity="0.95"/>
  <circle cx="64" cy="168" r="3.5" fill="#a855f7" filter="url(#strongGlow)" opacity="0.9"/>
  <circle cx="62" cy="56" r="4" fill="#38bdf8" filter="url(#strongGlow)" opacity="0.95"/>
  <circle cx="128" cy="46" r="3.5" fill="#a855f7" filter="url(#strongGlow)" opacity="0.9"/>

  <!-- Orbital ring arcs - more rings -->
  <ellipse cx="128" cy="115" rx="72" ry="22" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.18" stroke-dasharray="10 18" transform="rotate(-15 128 115)"/>
  <ellipse cx="128" cy="115" rx="72" ry="22" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.18" stroke-dasharray="10 18" transform="rotate(75 128 115)"/>
  <ellipse cx="128" cy="115" rx="72" ry="22" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.14" stroke-dasharray="6 22" transform="rotate(165 128 115)"/>
  <ellipse cx="128" cy="115" rx="50" ry="15" fill="none" stroke="#38bdf8" stroke-width="0.5" opacity="0.12" stroke-dasharray="4 12" transform="rotate(45 128 115)"/>

  <!-- Inner geometric pattern - nested rings -->
  <circle cx="128" cy="115" r="38" fill="none" stroke="#475569" stroke-width="0.4" opacity="0.2" stroke-dasharray="3 6"/>
  <circle cx="128" cy="115" r="48" fill="none" stroke="#334155" stroke-width="0.4" opacity="0.15" stroke-dasharray="2 8"/>

  <!-- Core node -->
  <circle cx="128" cy="115" r="24" fill="url(#coreInner)" filter="url(#strongGlow)"/>

  <!-- Inner core rings -->
  <circle cx="128" cy="115" r="14" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.35"/>
  <circle cx="128" cy="115" r="18" fill="none" stroke="#e2e8f0" stroke-width="0.4" opacity="0.2"/>

  <!-- Core highlight -->
  <circle cx="123" cy="108" r="7" fill="#ffffff" opacity="0.3"/>
  <circle cx="130" cy="113" r="3" fill="#ffffff" opacity="0.5"/>

  <!-- Corner accents -->
  <rect x="22" y="22" width="12" height="3" rx="1" fill="#38bdf8" opacity="0.3"/>
  <rect x="22" y="28" width="3" height="12" rx="1" fill="#38bdf8" opacity="0.3"/>
  <rect x="222" y="22" width="12" height="3" rx="1" fill="#a855f7" opacity="0.3"/>
  <rect x="231" y="28" width="3" height="12" rx="1" fill="#a855f7" opacity="0.3"/>
  <rect x="22" y="226" width="12" height="3" rx="1" fill="#a855f7" opacity="0.3"/>
  <rect x="22" y="216" width="3" height="12" rx="1" fill="#a855f7" opacity="0.3"/>
  <rect x="222" y="226" width="12" height="3" rx="1" fill="#38bdf8" opacity="0.3"/>
  <rect x="231" y="216" width="3" height="12" rx="1" fill="#38bdf8" opacity="0.3"/>
</svg>
