<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>空间 — 认知涌现 AI</title>
<link rel="stylesheet" href="/static/mobile.css">
</head>
<body>

<!-- ─── 启动动画 ─── -->
<div class="startup-overlay" id="startupOverlay">
  <canvas class="startup-canvas" id="startupCanvas"></canvas>
  <div class="startup-center">
    <div class="startup-logo-wrap">
      <svg class="startup-logo-svg" viewBox="0 0 256 256" width="120" height="120">
        <defs>
          <radialGradient id="suBg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a2538"/><stop offset="100%" stop-color="#080c14"/></radialGradient>
          <radialGradient id="suGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#a855f7" stop-opacity="0.9"/><stop offset="40%" stop-color="#38bdf8" stop-opacity="0.6"/><stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/></radialGradient>
          <radialGradient id="suCore" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#e2e8f0"/><stop offset="60%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#a855f7"/></radialGradient>
          <filter id="suGlowFilter"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="suSoftGlow"><feGaussianBlur stdDeviation="8"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <circle cx="128" cy="128" r="124" fill="url(#suBg)" stroke="#2a3a5c" stroke-width="1.5" opacity="0.6"/>
        <circle cx="128" cy="115" r="75" fill="url(#suGlow)" filter="url(#suSoftGlow)" opacity="0.4"/>
        <g class="startup-rays">
          <line class="sr sr1" x1="128" y1="110" x2="192" y2="46" stroke="#38bdf8" stroke-width="1.2"/><line class="sr sr2" x1="128" y1="110" x2="200" y2="166" stroke="#a855f7" stroke-width="1.2"/>
          <line class="sr sr3" x1="128" y1="110" x2="128" y2="198" stroke="#38bdf8" stroke-width="1.2"/><line class="sr sr4" x1="128" y1="110" x2="56" y2="174" stroke="#a855f7" stroke-width="1.2"/>
          <line class="sr sr5" x1="128" y1="110" x2="54" y2="46" stroke="#38bdf8" stroke-width="1.2"/><line class="sr sr6" x1="128" y1="110" x2="128" y2="38" stroke="#a855f7" stroke-width="1.2"/>
        </g>
        <g class="startup-nodes">
          <circle class="sn sn1" cx="184" cy="56" r="3.5" fill="#38bdf8"/><circle class="sn sn2" cx="194" cy="158" r="3" fill="#a855f7"/>
          <circle class="sn sn3" cx="128" cy="190" r="3.5" fill="#38bdf8"/><circle class="sn sn4" cx="64" cy="168" r="3" fill="#a855f7"/>
          <circle class="sn sn5" cx="62" cy="56" r="3.5" fill="#38bdf8"/><circle class="sn sn6" cx="128" cy="46" r="3" fill="#a855f7"/>
        </g>
        <circle cx="128" cy="115" r="22" fill="url(#suCore)" filter="url(#suGlowFilter)" class="startup-core"/>
        <circle cx="124" cy="110" r="6" fill="#fff" opacity="0.25" class="startup-highlight"/>
      </svg>
    </div>
    <div class="startup-title">
      <span class="startup-title-zh">空间</span>
      <span class="startup-title-divider"></span>
      <span class="startup-title-en">Cognitive Emergence Engine</span>
    </div>
    <div class="startup-subtitle">认知涌现 · T1-T6 全引擎就绪</div>
    <div class="startup-engine-tags">
      <span class="startup-tag">T1 同构</span><span class="startup-tag">T2 共振</span><span class="startup-tag">T3 测地</span>
      <span class="startup-tag">T4 蜕变</span><span class="startup-tag">T5 反事实</span><span class="startup-tag">T6 不变量</span>
    </div>
  </div>
</div>

<!-- ─── 背景粒子 ─── -->
<canvas class="bg-particles" id="bgParticles"></canvas>

<!-- ─── Header ─── -->
<div class="header">
  <div class="header-left">
    <div class="header-menu" onclick="CeeApp.toggleDrawer()" title="历史会话 (Ctrl+B)">
      <span></span><span></span><span></span>
    </div>
    <div class="header-logo"><img src="/static/avatar.svg" alt="CEE" width="32" height="32"></div>
    <div class="header-title">空间</div>
  </div>
  <div class="header-right">
    <button class="btn-icon" onclick="CeeApp.newConversation()" title="新建对话 (Ctrl+N)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>
    <button class="btn-icon" onclick="CeeApp.UIManager.openSettings()" title="设置 (Ctrl+,)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>
  </div>
</div>

<!-- ─── 设置弹窗 ─── -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)CeeApp.UIManager.closeSettings()">
  <div class="settings-modal">
    <div class="settings-modal-header">
      <div class="settings-modal-title">设置</div>
      <button class="settings-modal-close" onclick="CeeApp.UIManager.closeSettings()">&times;</button>
    </div>
    <div class="settings-modal-body">
      <div class="settings-field">
        <label>API Key</label>
        <input type="password" id="apiKeyInput" placeholder="sk-..." onchange="CeeApp.saveSettings()">
      </div>
      <div class="settings-field">
        <label>Base URL</label>
        <input id="baseUrlInput" value="https://api.openai.com/v1" onchange="CeeApp.saveSettings()">
      </div>
      <div class="settings-field">
        <label>模型</label>
        <input id="modelInput" value="gpt-4o-mini" onchange="CeeApp.saveSettings()">
      </div>
      <div class="settings-field">
        <label>Temperature</label>
        <div class="settings-row">
          <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="0.7" oninput="CeeApp.SettingsManager.updateTempDisplay()" onchange="CeeApp.saveSettings()">
          <span id="tempValue">0.7</span>
        </div>
      </div>
      <div class="settings-field">
        <label>最大 Token</label>
        <input type="number" id="maxTokensInput" value="4096" min="256" max="32768" step="256" onchange="CeeApp.saveSettings()">
      </div>
      <div class="settings-field" onclick="CeeApp.toggleTheme()">
        <label>主题模式</label>
        <span id="themeLabel">暗色</span>
      </div>
    </div>
  </div>
</div>

<!-- ─── 历史会话侧边栏 ─── -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-header-title">历史会话</div>
    <div class="drawer-header-close" onclick="CeeApp.toggleDrawer()">&times;</div>
  </div>
  <div class="drawer-search">
    <input class="drawer-search-input" id="drawerSearchInput" placeholder="搜索会话..." oninput="CeeApp.SessionManager.filter(this.value)">
  </div>
  <div class="drawer-body" id="drawerBody">
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>
  <div class="drawer-footer">
    <button class="btn-new-conv" onclick="CeeApp.newConversation()">+ 新建对话</button>
  </div>
</div>

<!-- ─── 主聊天区 ─── -->
<main>
  <canvas id="starCanvas"></canvas>
  <div class="welcome" id="welcome">
    <div class="welcome-icon"><img src="/static/avatar.svg" alt="CEE" width="64" height="64"></div>
    <div class="welcome-hi">Hi，我是空间</div>
    <div class="welcome-sub">基于认知涌现引擎的 AI 助手</div>
  </div>
  <div class="messages" id="messages"></div>
</main>

<!-- ─── 输入栏 ─── -->
<div class="input-bar" id="inputBar">
  <div class="input-wrap">
    <textarea class="chat-input" id="chatInput" rows="1" placeholder="发消息..." onkeydown="CeeApp.handleInputKey(event)" oninput="autoResize(this)"></textarea>
  </div>
  <button class="btn-send" id="sendBtn" onclick="CeeApp.sendMessage()" disabled>
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<!-- ─── 底部占位 (iOS safe area) ─── -->
<div class="bottom-safe"></div>

<!-- ─── Toast ─── -->
<div class="toast-container" id="toastContainer"></div>

<!-- ─── 快捷键提示条 ─── -->
<div class="shortcuts-bar" id="shortcutsBar"></div>

<!-- ─── 涌现达成仪式 ─── -->
<div class="ritual-overlay" id="ritual">
  <div class="ritual-crystal"></div>
  <div class="ritual-text">涌现达成 S 级</div>
</div>

<script>
/* polyfills */
function toggleDrawer(){CeeApp.toggleDrawer()}
function handleInputKey(e){CeeApp.handleInputKey(e)}
function sendMessage(){CeeApp.sendMessage()}
function saveSettings(){CeeApp.saveSettings()}
function newConversation(){CeeApp.newConversation()}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
</script>
<script src="/static/mobile.js"></script>
</body>
</html>
