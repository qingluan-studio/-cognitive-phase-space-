<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0F">
<title>CEE 认知涌现引擎 v4.0</title>
<style>
:root{
--bg:#0A0A0F;--bg2:#111118;--bg3:#1A1A26;--fg:#E4E4EC;--fg2:#9CA3AF;
--accent:#00D4FF;--purple:#7B61FF;--coral:#FF6B6B;--green:#4ADE80;
--border:#2A2A3A;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4);
--itc:#00D4FF;--scs:#4ADE80;--iec:#7B61FF;--pfft:linear-gradient(135deg,#00D4FF,#7B61FF);
--safe-bottom:env(safe-area-inset-bottom,16px);
}
[data-theme="light"]{
--bg:#F5F5F7;--bg2:#FFFFFF;--bg3:#E8E8ED;--fg:#1A1A2E;--fg2:#6B7280;
--border:#D1D5DB;--shadow:0 4px 24px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden;min-height:100dvh;-webkit-tap-highlight-color:transparent;transition:background .4s,color .4s}
#app{padding-bottom:calc(72px + var(--safe-bottom))}
.page{display:none;padding:16px;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes ripple{to{transform:scale(4);opacity:0}}
@keyframes breathe{0%,100%{box-shadow:0 0 8px var(--iec)}50%{box-shadow:0 0 24px var(--iec),0 0 48px var(--purple)}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 8px var(--accent)}50%{text-shadow:0 0 24px var(--accent),0 0 48px var(--purple)}}
@keyframes webFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes crystalForm{0%{transform:scale(0) rotate(0deg);opacity:0}50%{transform:scale(1.2) rotate(180deg);opacity:.8}100%{transform:scale(1) rotate(360deg);opacity:1}}
@keyframes particleDissolve{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(2) translateY(-40px)}}
@keyframes snareShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
@keyframes warningCreep{0%{transform:translateY(100%)}100%{transform:translateY(0)}}
@keyframes cosmicDrift{0%{background-position:0 0}100%{background-position:100% 100%}}
@keyframes titleGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5)}}
</style>
</head>
<body>
<div id="app"></div>
<nav id="tabBar">
<button data-page="home" class="tab active" aria-label="首页">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
<span>首页</span>
</button>
<button data-page="engines" class="tab" aria-label="引擎">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
<span>T1-T6</span>
</button>
<button data-page="web" class="tab" aria-label="蛛网">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
<span>活蛛网</span>
</button>
<button data-page="governance" class="tab" aria-label="治理">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
<span>治理</span>
</button>
<button data-page="settings" class="tab" aria-label="设置">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
<span>设置</span>
</button>
</nav>

<style>
#tabBar{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--bg2);border-top:1px solid var(--border);z-index:100;padding-bottom:var(--safe-bottom);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
#tabBar .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:none;color:var(--fg2);font-size:10px;gap:2px;cursor:pointer;transition:color .3s;position:relative}
#tabBar .tab.active{color:var(--accent)}
#tabBar .tab.active::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;background:var(--accent);border-radius:0 0 2px 2px}
</style>

<script>
const API='';

function $p(id){return document.getElementById(id)}
function $q(s){return document.querySelector(s)}
function $qa(s){return document.querySelectorAll(s)}

let currentPage='home';
let theme='dark';
let perfMode=false;
let sensoryMode=false;

async function api(path,body){
  try{
    const r=await fetch(API+path,{
      method:body?'POST':'GET',
      headers:body?{'Content-Type':'application/json'}:{},
      body:body?JSON.stringify(body):undefined
    });
    return await r.json();
  }catch(e){return null}
}

function switchPage(name){
  currentPage=name;
  $qa('.page').forEach(p=>p.classList.remove('active'));
  const page=$p('page-'+name);
  if(page)page.classList.add('active');
  $qa('#tabBar .tab').forEach(t=>t.classList.remove('active'));
  const tab=$q('#tabBar [data-page="'+name+'"]');
  if(tab)tab.classList.add('active');
  if(name==='web')initLivingWeb();
  if(name==='home')refreshDashboard();
}

function badgeTier(score,cls){
  const t=score>=.9?'S':score>=.8?'A':score>=.7?'B':score>=.5?'C':'D';
  const c={'S':'#FFD700','A':varGet('--green'),'B':varGet('--accent'),'C':varGet('--coral'),'D':'#EF4444'}[t];
  return '<span class="tier-badge '+cls+'" style="background:'+c+'20;color:'+c+';border:1px solid '+c+'40">'+t+'</span>';
}

function varGet(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()}

function toggleTheme(){
  theme=theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',theme);
  localStorage.setItem('cee-theme',theme);
  const btn=$p('themeToggle');
  if(btn)btn.textContent=theme==='dark'?'🌙':'☀️';
}

function togglePerf(){
  perfMode=!perfMode;
  document.documentElement.setAttribute('data-perf',perfMode?'true':'false');
  const btn=$p('perfToggle');
  if(btn)btn.textContent=perfMode?'性能模式:开':'性能模式:关';
}

function toggleSensory(){
  sensoryMode=!sensoryMode;
  document.documentElement.setAttribute('data-sensory',sensoryMode?'true':'false');
  const btn=$p('sensoryToggle');
  if(btn)btn.textContent=sensoryMode?'感官友好:开':'感官友好:关';
}

async function refreshDashboard(){
  const status=await api('/api/system/status');
  if(!status)return;
  const el=$p('dash-status');
  if(!el)return;
  const e=status.engines||{};
  let html='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">';
  for(const [k,v] of Object.entries(e)){
    const dot=v==='online'?'#4ADE80':'#FF6B6B';
    html+='<div class="card" style="padding:10px;text-align:center"><div style="width:8px;height:8px;border-radius:50%;background:'+dot+';display:inline-block;margin-right:6px;box-shadow:0 0 6px '+dot+'"></div>'+k+'</div>';
  }
  html+='</div>';
  const inv=status.invariants||{};
  html+='<div class="card" style="margin-top:12px"><h4 style="color:var(--accent);margin-bottom:8px">系统不变量</h4>';
  for(const [k,v] of Object.entries(inv)){
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin:6px 0"><span style="font-weight:600">'+k+'</span><div style="flex:1;margin:0 10px;height:4px;background:var(--bg3);border-radius:2px"><div style="height:100%;width:'+(v*100)+'%;background:'+({'ITC':'var(--itc)','SCS':'var(--scs)','IEC':'var(--iec)','PFFT':varGet('--accent')}[k]||'var(--accent)')+';border-radius:2px"></div></div><span>'+(v*100).toFixed(0)+'%</span></div>';
  }
  html+='</div>';
  html+='<div class="card" style="margin-top:12px"><div style="display:flex;justify-content:space-around;text-align:center"><div><div style="font-size:1.5em;font-weight:800;color:var(--accent)">'+(status.decisions_logged||0)+'</div><small style="color:var(--fg2)">决策日志</small></div><div><div style="font-size:1.5em;font-weight:800;color:var(--purple)">'+(status.legacy_items||0)+'</div><small style="color:var(--fg2)">知识遗产</small></div><div><div style="font-size:1.5em;font-weight:800;color:var(--green)">'+(status.uptime_s||0)+'s</div><small style="color:var(--fg2)">运行时间</small></div></div></div>';
  el.innerHTML=html;
}

function showToast(msg,type='info'){
  const t=document.createElement('div');
  t.className='toast toast-'+type;
  t.textContent=msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300)},2500);
}

const engineTemplates={
  T1:{
    title:'T1 Mirror 认知同构',
    desc:'不读原文，仅凭路标生成等价内容。命题覆盖100%，6/6立场反转。',
    placeholder:'输入一段文本来提取路标并生成等价镜像...',
    example:'量子计算利用量子叠加态进行并行计算，相比经典计算机有指数级加速优势。',
    renderResult(data){return '<div class="result-section"><h4 style="color:var(--accent)">路标提取</h4><div class="tag-row">'+(data.landmarks||[]).map(l=>'<span class="tag">'+l.type+'</span>').join('')+'</div><h4 style="color:var(--accent);margin-top:12px">镜像生成</h4><p style="background:var(--bg3);padding:12px;border-radius:var(--radius);margin:8px 0">'+(data.mirrored||'')+'</p><p>等价度: <strong style="color:var(--green)">'+(data.equivalence_score||0)+'</strong></p></div>';}
  },
  T2:{
    title:'T2 Prism 超图坍缩',
    desc:'高维超图坍缩，生成多元解读。5角度生成，追溯率95.2%。',
    placeholder:'输入文本以生成多角度解读视角...',
    example:'人工智能正在改变医疗诊断的方式，从影像分析到药物发现。',
    renderResult(data){let h='<div class="result-section"><h4 style="color:var(--accent)">多视角解读</h4>';for(const p of(data.perspectives||[])){h+='<div class="card" style="margin:8px 0"><div style="display:flex;justify-content:space-between"><strong>'+p.angle+'</strong><span style="color:var(--accent)">'+(p.score||0)+'</span></div><p style="color:var(--fg2);margin-top:4px">'+(p.content||'')+'</p></div>'}h+='<p>追溯率: <strong style="color:var(--green)">'+((data.trace_rate||0)*100).toFixed(1)+'%</strong></p></div>';return h;}
  },
  T3:{
    title:'T3 Geodesic 测地线导航',
    desc:'语义流形测地线导航。3条路径，2条新颖，原子层破局。',
    placeholder:'输入文本以在语义空间中导航...',
    example:'如何提高深度学习模型的泛化能力？',
    renderResult(data){let h='<div class="result-section"><h4 style="color:var(--accent)">导航路径</h4>';for(const p of(data.paths||[])){h+='<div class="card" style="margin:8px 0"><div style="display:flex;justify-content:space-between"><strong>'+p.label+'</strong>'+(p.novel?'<span class="tag" style="background:var(--green)20;color:var(--green)">新颖</span>':'')+'</div><p style="color:var(--fg2);margin-top:4px">'+(p.content||'')+'</p><small style="color:var(--fg2)">距离: '+(p.distance||0)+'</small></div>'}h+='<p>新颖路径: <strong style="color:var(--purple)">'+(data.novel_count||0)+'</strong></p></div>';return h;}
  },
  T4:{
    title:'T4 Crystallization 知识结晶',
    desc:'信息碎片随机碰撞，知识自发结晶。11个晶体，9+处涌现关联。',
    placeholder:'输入多个信息片段或知识点，让它们自发结晶形成关联...',
    example:'神经网络是一种受生物启示的计算模型。反向传播是训练神经网络的核心算法。注意力机制使得模型能够聚焦于输入的关键部分。',
    renderResult(data){let h='<div class="result-section"><h4 style="color:var(--accent)">知识晶体 ('+(data.crystal_count||0)+')</h4><div class="crystal-grid">';for(const c of(data.crystals||[])){h+='<div class="card crystal-card" style="padding:10px"><small style="color:var(--accent)">'+c.id+'</small><p>'+(c.content||'')+'</p><small style="color:var(--fg2)">'+(c.score||0)+'</small></div>'}h+='</div><h4 style="color:var(--purple);margin-top:12px">涌现关联</h4>';for(const a of(data.emergent_associations||[])){h+='<div class="emergent-link"><span style="color:var(--purple)">&#9670;</span> '+a+'</div>'}h+='</div>';return h;}
  },
  T5:{
    title:'T5 Genesis 思想种子',
    desc:'思想种子反事实生长出平行宇宙。11个分枝，杂交1+1>2。',
    placeholder:'输入一个思想种子，让它反事实生长出分支...',
    example:'如果我们能以光速旅行，人类文明将会变成什么样？',
    renderResult(data){let h='<div class="result-section"><h4 style="color:var(--accent)">分枝宇宙 ('+(data.branch_count||0)+')</h4>';for(const b of(data.branches||[])){h+='<div class="card" style="margin:8px 0"><div style="display:flex;justify-content:space-between"><strong>'+b.id+'</strong><span style="color:var(--green)">适应度: '+(b.fitness||0)+'</span></div><p style="color:var(--fg2);margin-top:4px">'+(b.content||'')+'</p></div>'}if(data.hybrid){h+='<h4 style="color:var(--purple);margin-top:12px">杂交结果</h4><div class="card" style="border:1px solid var(--purple)"><p>'+(data.hybrid.content||'')+'</p><p style="color:var(--green)">杂交增益: '+(data.hybrid.advantage||0)+'x</p></div>'}h+='</div>';return h;}
  },
  T6:{
    title:'T6 Invariant 认知几何不变量',
    desc:'SVM 94.0%，H1-H4全验证。ITC/SCS/IEC/PFFT 四维评估。',
    placeholder:'输入文本来评估其认知质量...',
    example:'认知涌现引擎是一套具备自我宪法的认知科研体系，通过四个几何不变量实现对认知产物的自主质量判断。',
    renderResult(data){const rad=80;let svg='<svg viewBox="0 0 200 200" style="width:180px;height:180px;margin:auto;display:block"><circle cx="100" cy="100" r="'+rad+'" fill="none" stroke="var(--border)" stroke-width="1"/>';for(let i=1;i<=4;i++){const r=rad*i/4;svg+='<circle cx="100" cy="100" r="'+r+'" fill="none" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>'}const points=[['ITC',-90],[90,-90],['SCS',0],['IEC',90],[0,90],['PFFT',0]];const labels=[['ITC',100,70],['SCS',170,95],['PFFT',100,120],['IEC',30,95]];const vals=[data.itc||0,data.scs||0,data.iec||0,data.pfft||0];let poly='';for(let i=0;i<4;i++){const a=(Math.PI*2*i/4)-Math.PI/2;const r=vals[i]*rad;poly+=(100+r*Math.cos(a))+','+(100+r*Math.sin(a))+' '}svg+='<polygon points="'+poly.trim()+'" fill="'+varGet('--accent')+'20" stroke="'+varGet('--accent')+'" stroke-width="2"/>';for(const l of labels){svg+='<text x="'+l[1]+'" y="'+l[2]+'" text-anchor="middle" fill="var(--fg2)" font-size="10">'+l[0]+'</text>'}svg+='</svg>';let h='<div class="result-section">'+svg+'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">';const colors={itc:'var(--itc)',scs:'var(--scs)',iec:'var(--iec)',pfft:'var(--accent)'};for(const [k,c] of Object.entries(colors)){const v=data[k]||0;h+='<div class="card" style="text-align:center;padding:8px"><div style="font-size:1.4em;font-weight:800;color:'+c+'">'+(v*100).toFixed(0)+'%</div><small style="color:var(--fg2)">'+k.toUpperCase()+'</small></div>'}h+='</div>';h+='<div style="text-align:center;margin:12px 0">评级: '+badgeTier((data.itc+data.scs+data.iec+data.pfft)/4,'')+'</div>';if(data.suggestions&&data.suggestions.length){h+='<h4 style="color:var(--accent)">改进建议</h4>';for(const s of data.suggestions)h+='<div style="padding:6px 0;border-bottom:1px solid var(--border)">'+s+'</div>'}h+='</div>';return h;}
  }
};

let activeEngine=null;

function showEngine(id){
  activeEngine=id;
  const t=engineTemplates[id];
  if(!t)return;
  const panel=$p('engine-panel');
  panel.innerHTML='<h2 style="font-size:1.3em;margin-bottom:4px">'+t.title+'</h2><p style="color:var(--fg2);margin-bottom:12px">'+t.desc+'</p><div class="card" style="position:relative"><textarea id="engineInput" class="cee-input" placeholder="'+t.placeholder+'" rows="3">'+t.example+'</textarea><div id="thermometer" class="thermometer"></div></div><button id="engineRun" class="btn primary" style="width:100%;margin-top:8px">运行 '+id+'</button><div id="engineResult" style="margin-top:12px"></div>';
  document.getElementById('engineRun').onclick=()=>runEngine(id);
  const input=document.getElementById('engineInput');
  input.addEventListener('input',()=>updateThermometer(input.value));
  updateThermometer(t.example);
}

async function runEngine(id){
  const input=$p('engineInput').value.trim();
  if(!input)return;
  const btn=$p('engineRun');
  btn.disabled=true;btn.textContent='计算中...';
  const endpoints={T1:'/api/t1/mirror',T2:'/api/t2/prism',T3:'/api/t3/geodesic',T4:'/api/t4/crystallize',T5:'/api/t5/genesis',T6:'/api/t6/evaluate'};
  const data=await api(endpoints[id],{text:input,options:{}});
  btn.disabled=false;btn.textContent='运行 '+id;
  const result=$p('engineResult');
  if(data)result.innerHTML=engineTemplates[id].renderResult(data);
  else result.innerHTML='<p style="color:var(--coral)">引擎调用失败</p>';
  checkEmergenceRitual(data,id);
}

function updateThermometer(text){
  const el=$p('thermometer');
  if(!el)return;
  const words=text.trim().split(/\s+/).filter(Boolean);
  const unique=new Set(words.map(w=>w.toLowerCase()));
  const diversity=unique.size/Math.max(1,words.length);
  const iec=Math.min(1,Math.max(0,diversity*words.length/Math.max(1,words.length+5)*1.5));
  el.style.setProperty('--iec-val',iec);
  let cls='';
  if(iec>.7)cls='critical';
  else if(iec>.4)cls='optimal';
  else cls='redundant';
  el.className='thermometer thermo-'+cls;
}

function checkEmergenceRitual(data,engineId){
  if(engineId!=='T6')return;
  const avg=((data.itc||0)+(data.scs||0)+(data.iec||0)+(data.pfft||0))/4;
  if(avg<.9)return;
  const overlay=document.createElement('div');
  overlay.className='ritual-overlay';
  overlay.innerHTML='<div class="ritual-content"><div class="ritual-crystal"></div><div class="ritual-text">认知涌现</div><div class="ritual-particles"><span></span><span></span><span></span><span></span><span></span></div></div>';
  document.body.appendChild(overlay);
  requestAnimationFrame(()=>overlay.classList.add('active'));
  setTimeout(()=>{overlay.classList.remove('active');setTimeout(()=>overlay.remove(),500)},2500);
}
</script>

// ── Living Web Canvas ─────────────────────────────────────────────

let webNodes=[],webEdges=[],webAnimId=null;

function initLivingWeb(){
  const canvas=$p('webCanvas');
  if(!canvas||webAnimId)return;
  if(perfMode){canvas.height=280;canvas.width=canvas.parentElement.clientWidth}else{canvas.height=420;canvas.width=canvas.parentElement.clientWidth}
  const ctx=canvas.getContext('2d');

  // Generate node/edge data
  const count=perfMode?12:22;
  webNodes=[];webEdges=[];
  const cx=canvas.width/2,cy=canvas.height/2,rx=canvas.width*.4,ry=canvas.height*.35;

  for(let i=0;i<count;i++){
    const a=(Math.PI*2*i/count)-Math.PI/2;
    webNodes.push({
      x:cx+Math.cos(a)*rx*(.7+Math.random()*.3),
      y:cy+Math.sin(a)*ry*(.7+Math.random()*.3),
      baseX:cx+Math.cos(a)*rx,
      baseY:cy+Math.sin(a)*ry,
      iec:.3+Math.random()*.6,
      scs:.3+Math.random()*.6,
      size:3+Math.random()*6,
      color:['#00D4FF','#7B61FF','#4ADE80','#FF6B6B'][Math.floor(Math.random()*4)],
      pulse:0,
      angle:a,
    });
  }

  for(let i=0;i<count;i++){
    for(let j=i+1;j<Math.min(count,i+5);j++){
      const itc=.2+Math.random()*.7;
      webEdges.push({from:i,to:j,itc,scs:.3+Math.random()*.6});
    }
  }

  // Legend
  const legend=$p('webLegend');
  legend.innerHTML='<span style="color:var(--itc)">ITC 拓扑张力</span><span style="color:var(--scs)">SCS 路径顺滑</span><span style="color:var(--iec)">IEC 信息脉动</span><span style="color:var(--accent)">PFFT 投影折射</span>';

  function draw(){
    if(currentPage!=='web'){webAnimId=null;return}
    webAnimId=requestAnimationFrame(draw);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const t=Date.now()*.001;

    // Draw edges
    for(const e of webEdges){
      const n1=webNodes[e.from],n2=webNodes[e.to];
      const alpha=.15+e.itc*.5;
      const w=.4+e.itc*2.5;
      ctx.beginPath();ctx.moveTo(n1.x,n1.y);ctx.lineTo(n2.x,n2.y);
      ctx.strokeStyle='rgba(0,212,255,'+alpha+')';ctx.lineWidth=w;ctx.stroke();

      // SCS flow particles
      if(e.scs>.6){
        const prog=(t*e.scs*2)%1;
        const px=n1.x+(n2.x-n1.x)*prog,py=n1.y+(n2.y-n1.y)*prog;
        ctx.beginPath();ctx.arc(px,py,1.2,0,Math.PI*2);
        ctx.fillStyle='rgba(74,222,128,'+e.scs+')';ctx.fill();
      }
    }

    // Draw nodes
    for(const n of webNodes){
      n.pulse=.5+.5*Math.sin(t*Math.PI*2*(.3+n.iec*2));
      n.x=n.baseX+Math.sin(t+n.angle)*4*n.pulse;
      n.y=n.baseY+Math.cos(t+n.angle+1)*4*n.pulse;

      // Glow
      const glow=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.size*3);
      glow.addColorStop(0,n.color+'60');glow.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(n.x,n.y,n.size*3,0,Math.PI*2);
      ctx.fillStyle=glow;ctx.fill();

      // Node body
      ctx.beginPath();ctx.arc(n.x,n.y,n.size,0,Math.PI*2);
      ctx.fillStyle=n.color;ctx.fill();
      ctx.strokeStyle=n.color+'80';ctx.lineWidth=1;ctx.stroke();

      // IEC pulse ring
      if(n.iec>.55){
        const pr=n.size+2+n.pulse*4;
        ctx.beginPath();ctx.arc(n.x,n.y,pr,0,Math.PI*2);
        ctx.strokeStyle=n.color+Math.floor(40+n.iec*40).toString(16);ctx.lineWidth=1;ctx.stroke();
      }
    }
  }
  draw();
}

});

</script>
